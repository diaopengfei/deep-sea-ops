<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="800" height="320" role="img" aria-label="deepsea-ops banner">
  <defs>
    <!-- 深海渐变: 顶部海面蓝 → 底部深渊黑蓝 -->
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e4d7a"/>
      <stop offset="35%" stop-color="#073454"/>
      <stop offset="75%" stop-color="#031f38"/>
      <stop offset="100%" stop-color="#01101f"/>
    </linearGradient>
    <!-- 海面光柱 -->
    <linearGradient id="ray" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5ab0ec" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#5ab0ec" stop-opacity="0"/>
    </linearGradient>
    <!-- 锚后方辉光 -->
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.55">
      <stop offset="0%" stop-color="#1c6fa8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#1c6fa8" stop-opacity="0"/>
    </radialGradient>
    <!-- 锚金属高光 -->
    <linearGradient id="anchorShade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="50%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#2a2a2a"/>
    </linearGradient>
  </defs>

  <!-- 深海背景 -->
  <rect width="800" height="320" fill="url(#sea)"/>

  <!-- 海面光柱 (三道斜射光) -->
  <polygon points="180,0 120,320 230,320 260,0" fill="url(#ray)"/>
  <polygon points="430,0 400,320 490,320 510,0" fill="url(#ray)" opacity="0.75"/>
  <polygon points="660,0 610,320 720,320 740,0" fill="url(#ray)" opacity="0.5"/>

  <!-- 锚后方辉光 -->
  <ellipse cx="400" cy="165" rx="170" ry="150" fill="url(#glow)"/>

  <!-- 气泡群 -->
  <circle cx="110" cy="250" r="5" fill="#7bc4ff" opacity="0.35"/>
  <circle cx="155" cy="210" r="3.5" fill="#7bc4ff" opacity="0.28"/>
  <circle cx="95"  cy="170" r="2.5" fill="#7bc4ff" opacity="0.22"/>
  <circle cx="690" cy="240" r="6" fill="#7bc4ff" opacity="0.32"/>
  <circle cx="645" cy="195" r="3" fill="#7bc4ff" opacity="0.26"/>
  <circle cx="725" cy="165" r="2" fill="#7bc4ff" opacity="0.2"/>
  <circle cx="200" cy="280" r="2.5" fill="#7bc4ff" opacity="0.2"/>
  <circle cx="600" cy="275" r="3.5" fill="#7bc4ff" opacity="0.22"/>

  <!-- 船锚 (黑色, 斜置 20°) -->
  <g transform="translate(400 160) rotate(20)" fill="url(#anchorShade)" stroke="#000" stroke-width="2" stroke-linejoin="round">
    <!-- 顶部圆环 -->
    <circle cx="0" cy="-95" r="16" fill="none" stroke-width="9"/>
    <!-- 锚干 (竖杆) -->
    <rect x="-7" y="-79" width="14" height="150" rx="3"/>
    <!-- 锚横杆 (stock) -->
    <rect x="-48" y="-60" width="96" height="11" rx="3"/>
    <!-- 横杆两端装饰 -->
    <rect x="-54" y="-63" width="8" height="17" rx="2"/>
    <rect x="46"  y="-63" width="8" height="17" rx="2"/>
    <!-- 锚冠 (crown, 底部连接点) -->
    <circle cx="0" cy="72" r="9"/>
    <!-- 左锚臂 (fluke) -->
    <path d="M 0 72
             Q -18 72 -38 60
             Q -62 46 -70 18
             Q -74 4 -64 -2
             Q -56 -6 -50 4
             Q -44 18 -36 30
             Q -22 48 -6 50
             Z"/>
    <!-- 左锚爪尖 -->
    <polygon points="-70,18 -82,8 -66,2"/>
    <!-- 右锚臂 (fluke) -->
    <path d="M 0 72
             Q 18 72 38 60
             Q 62 46 70 18
             Q 74 4 64 -2
             Q 56 -6 50 4
             Q 44 18 36 30
             Q 22 48 6 50
             Z"/>
    <!-- 右锚爪尖 -->
    <polygon points="70,18 82,8 66,2"/>
  </g>

  <!-- 项目名 -->
  <text x="400" y="295" text-anchor="middle"
        font-family="'Segoe UI', -apple-system, system-ui, sans-serif"
        font-size="26" font-weight="700" fill="#e6f3ff" letter-spacing="3">
    deepsea-ops
  </text>
  <text x="400" y="312" text-anchor="middle"
        font-family="'Segoe UI', -apple-system, system-ui, sans-serif"
        font-size="11" font-weight="400" fill="#6fa8d4" letter-spacing="2">
    DISTRIBUTED SERVER OPS PLATFORM
  </text>
</svg>
